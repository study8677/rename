name: CI

on:
  push:
    branches: [main]
  pull_request:

# Force UTF-8 on Windows runners so `Path.write_text(...)` and friends don't
# fall back to cp1252 and choke on Unicode (CJK, emoji, etc.) in our tests.
env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff
        run: ruff check src tests

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  macos-app:
    name: Build Retitle.app (Swift)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Show Swift version
        run: swift --version
      - name: swift build (debug)
        working-directory: macos-app
        run: swift build
      - name: Assemble Retitle.app
        working-directory: macos-app
        run: ./build-app.sh
      - name: Archive Retitle.app
        working-directory: macos-app
        run: |
          ditto -c -k --keepParent Retitle.app Retitle-app.zip
      - name: Upload Retitle.app artifact
        uses: actions/upload-artifact@v5
        with:
          name: Retitle-app-macos
          path: macos-app/Retitle-app.zip
          if-no-files-found: error
